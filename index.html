<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Extremely Perfect Mysterious Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Courier New', monospace;
    }

    body{
        overflow:hidden;
        height:100vh;
        background:black;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        color: white;
    }

    /* Background Smoke */
    .smoke{
        position:absolute;
        width:200%;
        height:200%;
        background:radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
        animation:smokeMove 12s linear infinite;
        opacity:0.5;
    }

    @keyframes smokeMove{
        0%{ transform:translate(-10%, -10%) rotate(0deg);}
        100%{ transform:translate(10%, 10%) rotate(360deg);}
    }

    /* Fading Light */
    .light{
        position:absolute;
        width:500px;
        height:500px;
        background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
        border-radius:50%;
        animation:flicker 3s infinite alternate;
    }

    @keyframes flicker{
        0%{opacity:0.2;}
        25%{opacity:0.5;}
        50%{opacity:0.1;}
        75%{opacity:0.4;}
        100%{opacity:0.2;}
    }

    /* Matrix Code Rain */
    .matrix-canvas{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-2;
        opacity:0.35;
        pointer-events:none;
    }

    /* Anonymous Boy */
    .boy{
        position:absolute;
        right:8%;
        bottom:80px;
        width:180px;
        height:220px;
    }

    .hood{
        position:absolute;
        width:120px;
        height:140px;
        background:#111;
        border-radius:60px 60px 40px 40px;
        left:30px;
        top:0;
    }

    .face{
        position:absolute;
        width:70px;
        height:70px;
        background:#000;
        border-radius:50%;
        left:55px;
        top:40px;
        box-shadow:0 0 10px rgba(255,255,255,0.1);
    }

    .body{
        position:absolute;
        width:160px;
        height:120px;
        background:#0b0b0b;
        border-radius:20px;
        bottom:0;
        left:10px;
    }

    /* Laptop */
    .laptop{
        position:absolute;
        width:140px;
        height:15px;
        background:#222;
        bottom:30px;
        left:20px;
        transform:rotate(-5deg);
        box-shadow:0 0 20px rgba(0,255,255,0.3);
    }

    .screen{
        position:absolute;
        width:110px;
        height:70px;
        background:#021;
        border:2px solid #0ff;
        bottom:45px;
        left:35px;
        animation:screenGlow 2s infinite alternate;
    }

    @keyframes screenGlow{
        0%{ box-shadow:0 0 5px #0ff;}
        100%{ box-shadow:0 0 25px #0ff;}
    }

    /* Typing Effect */
    .typing{
        position:absolute;
        top:10px;
        left:10px;
        color:#0f0;
        font-size:10px;
        letter-spacing:2px;
        animation:typing 3s infinite;
        white-space:nowrap;
        overflow:hidden;
        width:0;
    }

    @keyframes typing{
        0%{width:0;}
        50%{width:90px;}
        100%{width:0;}
    }

    /* Suspense Text */
    .title{
        position:absolute;
        top:8%;
        color:white;
        font-size:42px;
        letter-spacing:8px;
        text-transform:uppercase;
        text-shadow:0 0 20px rgba(255,255,255,0.5);
        animation:fadeText 4s infinite;
    }

    @keyframes fadeText{
        0%{opacity:0.2;}
        50%{opacity:1;}
        100%{opacity:0.2;}
    }

    /* Floating Dust */
    .dust{
        position:absolute;
        width:3px;
        height:3px;
        background:white;
        border-radius:50%;
        opacity:0.3;
        animation:float 10s linear infinite;
    }

    @keyframes float{
        from{
            transform:translateY(100vh);
        }
        to{
            transform:translateY(-100vh);
        }
    }

    /* Wolf Image */
    .wolf{
        position:absolute;
        left:5%;
        bottom:100px;
        width:200px;
        height:auto;
        opacity:0.7;
        filter:blur(1px) grayscale(50%);
        animation:fadeIn 10s infinite alternate;
    }

    @keyframes fadeIn{
        0%{opacity:0.3;}
        100%{opacity:0.8;}
    }

    /* King Image */
    .king{
        position:absolute;
        top:10%;
        left:50%;
        transform:translateX(-50%);
        width:300px;
        height:auto;
        opacity:0.5;
        filter:blur(2px) grayscale(70%);
        z-index:-1;
        animation:pulse 8s infinite;
    }

    @keyframes pulse{
        0%{opacity:0.3;}
        50%{opacity:0.7;}
        100%{opacity:0.3;}
    }

    /* Initial Text */
    .initial-text{
        position:absolute;
        top:20%;
        left:50%;
        transform:translateX(-50%);
        text-align:center;
        font-size:18px;
        opacity:1;
        animation:fadeOut 5s forwards;
    }

    @keyframes fadeOut{
        0%{opacity:1;}
        100%{opacity:0; display:none;}
    }

    /* Shock Element */
    .shock{
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        color:red;
        font-size:48px;
        opacity:0;
        animation:shockAnim 1s infinite;
        animation-delay:5s;
        animation-fill-mode:forwards;
    }

    @keyframes shockAnim{
        0%{opacity:0;}
        50%{opacity:1;}
        100%{opacity:0;}
    }

</style>
</head>

<body>

<canvas class="matrix-canvas"></canvas>
<div class="smoke"></div>
<div class="light"></div>

<h1 class="title">Unknown Presence</h1>

<!-- The King Image -->
<img class="king" src="The King.jpeg" alt="The King">

<div class="initial-text">
    <p>In the shadows, an anonymous figure sits cloaked in a hoodie, fingers dancing on a laptop keys...</p>
    <p>What secrets does this page hold? Stare into the void, and feel the chill creep in.</p>
</div>

<div class="shock">YOU'RE NOT ALONE!</div>

<!-- Anonymous Boy -->
<div class="boy">
    <div class="hood"></div>
    <div class="face"></div>
    <div class="body"></div>

    <div class="screen">
        <div class="typing">ACCESSING...</div>
    </div>

    <div class="laptop"></div>
</div>

<!-- Mysterious Wolf -->
<img class="wolf" src="Wolf.avif" alt="Mysterious Wolf">

<!-- Dust Particles -->
<div class="dust" style="left:10%; animation-duration:8s;"></div>
<div class="dust" style="left:25%; animation-duration:11s;"></div>
<div class="dust" style="left:40%; animation-duration:9s;"></div>
<div class="dust" style="left:55%; animation-duration:13s;"></div>
<div class="dust" style="left:70%; animation-duration:7s;"></div>
<div class="dust" style="left:85%; animation-duration:10s;"></div>

<!-- Background Sound -->
<audio autoplay loop>
    <source src="bot kak.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.querySelector('.matrix-canvas');
    const ctx = canvas.getContext('2d');
    const letters = '01abcXYZ$%^&*<>?!@#';
    const fontSize = 16;
    let columns = 0;
    let drops = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = Math.floor(canvas.width / fontSize);
        drops = Array(columns).fill(0);
    }

    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f0';
        ctx.font = `${fontSize}px monospace`;

        drops.forEach((y, index) => {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            const x = index * fontSize;
            ctx.fillText(text, x, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.98) {
                drops[index] = 0;
            } else {
                drops[index] = y + 0.5;
            }
        });

        requestAnimationFrame(drawMatrix);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    drawMatrix();
</script>

</body>
</html>
